# Integración continua de `nu`. Formaliza la disciplina que CLAUDE.md ya exige a
# mano —"toda sesión deja `go build ./...` verde", más el inventario 🔒 de tests
# unitarios obligatorios— y la corre en cada PR y en cada push a `main`. No hay
# nada específico de producto aquí: es DevOps del operador (ADR-013), no parte de
# la API sagrada ni de los contratos de extensión.
#
# Los comentarios y los `name:` van en español por coherencia con el repo; las
# claves YAML y los nombres de acciones, en inglés (sintaxis de la herramienta).
# Mismo patrón que el código Go: identificadores en inglés, prosa en español.
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# El PR cubre la validación pre-merge (lo importante); el push a `main`/`develop`
# cubre el commit de merge y mantiene el badge verde. Desde 2026-07-14 `develop`
# es la rama de integración (main solo estables): sus pushes y las PR contra ella
# corren los mismos checks —la protección de rama los exige—. No se dispara en
# las ramas `claude/*` de trabajo: el PR ya las valida, así no se gastan minutos
# por duplicado.

# Permisos mínimos: solo lectura del repo. Ningún job de CI publica nada.
permissions:
  contents: read

# Cancela ejecuciones obsoletas de la misma rama/PR cuando llega un push nuevo:
# no tiene sentido seguir testeando un commit que acaba de ser sustituido.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Comprobaciones estáticas, independientes del sistema operativo: se corren una
  # sola vez en Linux (duplicarlas en macOS sería desperdicio de minutos).
  calidad:
    name: Calidad (formato, vet, módulos, lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Preparar Go
        uses: actions/setup-go@v5
        with:
          # Una sola fuente de verdad para la versión exacta de Go: la directiva de
          # go.mod. No hay matriz multi-versión: `nu` se distribuye como binario,
          # no como librería que terceros compilan con su toolchain.
          go-version-file: go.mod
          cache: true

      - name: Formato (gofmt)
        # Falla si algún fichero no está formateado. `gofmt -l` lista los ficheros
        # con diferencias; si la lista no está vacía, la mostramos y salimos en error.
        run: |
          sin_formato=$(gofmt -l .)
          if [ -n "$sin_formato" ]; then
            echo "Ficheros sin formatear (corrige con 'gofmt -w'):"
            echo "$sin_formato"
            exit 1
          fi

      - name: Análisis estático (go vet)
        run: go vet ./...

      - name: Módulos limpios (verify + tidy)
        # Materializa "cero dependency hell" (filosofía §6): `go mod verify` valida
        # las sumas, y `go mod tidy` + `git diff --exit-code` falla si alguien añadió
        # un import sin reflejarlo en go.mod/go.sum (o dejó dependencias muertas).
        run: |
          go mod verify
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Lint (golangci-lint)
        # v7 instala golangci-lint v2, que es el formato de .golangci.yml (clave
        # `version: "2"`). La v6 instalaba la v1, que rechazaba ese esquema.
        uses: golangci/golangci-lint-action@v7
        with:
          # El binario exacto hace reproducible el baseline. Actualizarlo exige
          # ejecutar de nuevo el conjunto completo y dejarlo en cero hallazgos.
          version: v2.12.2
          # El baseline cubre todo el repositorio: ningún hallazgo queda oculto
          # por no pertenecer a las líneas modificadas por el PR (ADR-021).
          only-new-issues: false

  # Garantiza el requisito literal de CLAUDE.md ("go build ./... verde") y, además,
  # que el binario distribuible —estático, CGO_ENABLED=0— compila en los DOS sistemas
  # objetivo v1 (Linux y macOS, arquitectura.md). Un verde en Linux no garantiza
  # macOS: paths, señales y fsnotify difieren.
  build:
    name: Build estático y smoke test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Preparar Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Compilar todo
        run: go build ./...

      - name: Binario estático (flags de release)
        # Mismas flags que el release (ADR-013): estático (CGO_ENABLED=0),
        # reproducible (-trimpath), pequeño (-ldflags "-s -w"). Validar aquí que el
        # artefacto distribuible compila en cada OS evita sorpresas en el tag.
        run: CGO_ENABLED=0 go build -trimpath -ldflags "-s -w" -o nu .

      - name: Smoke test headless
        # Arranca el binario de verdad sin secretos: `nu -e` evalúa Lua headless y
        # sale 0 en éxito (códigos de salida de S45). Detecta regresiones de arranque
        # que `go build` no ve (un embed.FS roto, un panic en runtime.New()). No se
        # prueba `nu -p` (turno de agente): requeriría un provider/API key.
        run: |
          salida=$(./nu -e 'return nu.version.api')
          echo "nu.version.api = $salida"
          if [ -z "$salida" ]; then
            echo "El smoke test no imprimió nada (¿arranque roto?)" >&2
            exit 1
          fi

  # La suite de tests, con el detector de carrera SIEMPRE activo. El inventario 🔒
  # incluye tests de concurrencia (event loop S10, task.all/race S07, watchdog S09,
  # cancelación S08) que solo destapan data races bajo -race; correr sin él dejaría
  # ciega justo la parte del runtime que más lo necesita (el puente goroutine↔task,
  # ADR-011). Coste medido: ~30 s. En ambos OS objetivo, por la misma razón que build.
  test:
    name: Tests (-race)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Preparar Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go test -race
        # -shuffle=on baraja el orden de los tests: caza dependencias de orden
        # ocultas a coste cero. Se EXCLUYE internal/vmwasm: su suite compila N
        # módulos wazero con el motor JIT (páginas ejecutables mmap), y bajo la
        # instrumentación de -race el mmap ejecutable agota la memoria del runner
        # (OOM, no una carrera). Por eso `internal/vmwasm` se EXCLUYE aquí de forma
        # permanente y tiene su propio job (vmblob): su suite completa sin -race y sus
        # tests de concurrencia CON -race dirigido (subconjunto acotado, sin OOM).
        run: go test -race -shuffle=on $(go list ./... | grep -v /internal/vmwasm)

  # Blob de la VM wasm (migracion-vm.md M02, DM1): reconstruye nu.wasm desde las
  # fuentes pineadas de Lua + el shim, y verifica que el artefacto comiteado no ha
  # derivado. Guarda la reproducibilidad de la VM (DM1): permanente mientras wasm
  # sea la VM del kernel.
  vmblob:
    name: Blob de la VM (nu.wasm reproducible)
    # El runner ya NO necesita pineo: build.sh es hermético (fix post-M17,
    # migracion-vm.md) — descarga el wasi-sdk oficial pineado por sha256 y
    # compila con su clang/sysroot, sin tocar la toolchain de la distro. La
    # etiqueta móvil deja de poder cambiar el blob bajo los pies (lo hizo dos
    # veces cuando el build usaba el clang/wasi-libc de apt).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Preparar Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Reconstruir nu.wasm y verificar que el blob comiteado no derivó
        # build.sh descarga el wasi-sdk pineado (sha256), clona Lua pineado
        # (v5.4.7, commit verificado) y recompila. Si el resultado difiere del
        # nu.wasm comiteado, fuentes o shim cambiaron sin regenerar el blob: el
        # diff falla y hay que correr build.sh y comitear el nuevo artefacto.
        run: |
          hash_antes=$(sha256sum internal/vmwasm/nu.wasm | cut -d' ' -f1)
          internal/vmwasm/build.sh
          hash_despues=$(sha256sum internal/vmwasm/nu.wasm | cut -d' ' -f1)
          echo "comiteado: $hash_antes"
          echo "rebuild:   $hash_despues"
          git diff --exit-code internal/vmwasm/nu.wasm || {
            echo "nu.wasm derivó de sus fuentes: corre internal/vmwasm/build.sh y comitea el blob" >&2
            exit 1
          }

      - name: Tests del backend wasm (suite completa)
        run: go test ./internal/vmwasm/

      - name: Tests de concurrencia del backend wasm (-race dirigido)
        # El driver del scheduler y los workers (goroutines de fondo, canales) son
        # lo que -race audita; se corre sobre los tests que lo ejercen, sin OOM
        # (subconjunto acotado). TestWorker (M12) cubre el aislamiento entre
        # instancias, la mensajería acotada y terminate.
        run: go test -race -run 'TestSched|TestPrim|TestTask|TestTrampolinMultiInstancia|TestWorker' ./internal/vmwasm/
