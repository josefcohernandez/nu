name: Docs

# Construye y publica la web de documentación (web/) en GitHub Pages.
on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      # La wiki publica contratos de docs/ leídos en build: un cambio en la
      # fuente debe redesplegar la web (antes derivaba en silencio).
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un despliegue a la vez; no canceles uno en curso.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      # Gate de coherencia: la referencia publicada no puede discrepar de
      # docs/contracts/api.md (la fuente de verdad). Si falla, skill /sync-web.
      - run: npm run check:drift
      # Gate de accesibilidad: --fg y --dim deben cumplir contraste AA (≥4.5:1)
      # sobre --bg en los 4 themes. --dim es texto de lectura (statusline,
      # citas, footers); si baja de AA, rompe el build (hallazgo W-02).
      - run: npm run check:contraste
      # Gate de limpieza (fuente): los pares <!-- nu:interno --> de docs/ deben
      # estar balanceados antes de renderizar. Si falla, revisa los marcadores.
      - run: npm run check:limpieza:fuente
      # Gate de los plugins remark: comportamiento de limpieza y de enlaces
      # (api.md → /api, resolución de subcarpetas) + pareo WIKI_SLUGS ↔ docmap.
      - run: node scripts/test-limpieza.mjs --slugs
      - run: npm run build
      # Gate de limpieza (HTML): ningún marcador de proceso (G##/P##/✅/nu:interno)
      # puede haberse filtrado al HTML publicado. Si falla, skill /alta-wiki.
      - run: npm run check:limpieza
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
